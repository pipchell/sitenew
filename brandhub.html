<!DOCTYPE HTML>
<html lang="en-GB">
<head>
<title>Brand Hub – Pip Chell</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<meta name="robots" content="noindex">

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="stylesheet" href="assets/css/main.css" />
<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --blue:       #4696e5;
    --blue-dark:  #0B4881;

    --text-grey:  #828282;
    --text-black: #2d2d2d;

    --grey-light: #fbfbfb;
    --grey-border:#ebebeb;
}

/* FIX TEXT COLOUR */
body, h1, h2, h3, h4, p, li {
    color: var(--text-black);
}

/* Logos */
.logo-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1.5em;
    max-width:860px;
    margin:auto;
}
@media(max-width:736px){
    .logo-grid{grid-template-columns:1fr;}
}
.logo-card {
    border-radius:8px;
    padding:2em;
    display:flex;
    justify-content:center;
    align-items:center;
}
.logo-card.light { background:var(--grey-light); border:1px solid var(--grey-border); }
.logo-card.dark { background:var(--text-black); }
.logo-card.blue { background:var(--blue); }

/* Colours (WHITE BACKGROUND FIX) */
.colours-section {
    background:#ffffff;
}
.colour-grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:1.25em;
    max-width:860px;
    margin:auto;
}
@media(max-width:736px){
    .colour-grid{grid-template-columns:1fr 1fr;}
}
.colour-card {
    border-radius:8px;
    overflow:hidden;
    border:1px solid var(--grey-border);
}
.colour-swatch { height:80px; }
.colour-info {
    background:#ffffff;
    padding:0.8em;
    font-size:0.8em;
}
.colour-hex {
    cursor:pointer;
    font-family:monospace;
    color:var(--text-grey);
}
.colour-hex:hover {
    color:var(--blue);
}

/* Downloads TEXT FIX */
.download-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1.25em;
    max-width:860px;
    margin:auto;
}
@media(max-width:736px){
    .download-grid{grid-template-columns:1fr;}
}
.download-card {
    background:var(--grey-light);
    border:1px solid var(--grey-border);
    border-radius:8px;
    padding:1.5em;
}
.download-card * {
    color: var(--text-black) !important;
}
.download-card i {
    color: var(--blue) !important;
}

/* Toast */
.toast {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#000;
    color:#fff;
    padding:6px 12px;
    border-radius:20px;
    font-size:0.8em;
    opacity:0;
    transition:0.2s;
}
.toast.show { opacity:1; }
</style>
</head>

<body class="is-preload">

<!-- ORIGINAL HEADER (FROM YOUR FIRST FILE) -->
<div class="brand-hero">
    <h1>Brand Hub</h1>
    <p>Logos, colours, typography &amp; usage guidelines for Pip Chell</p>
</div>

<!-- Logos -->
<section class="wrapper style2 special">
<div class="inner">
<header class="major">
    <h2>Logos</h2>
</header>

<div class="logo-grid">
    <div class="logo-card light">
        <img src="/favicon.png" style="width:80px;">
    </div>
    <div class="logo-card dark">
        <img src="icons/whitelogo.png" style="width:80px;">
    </div>
    <div class="logo-card blue">
        <img src="icons/whitelogo.png" style="width:80px;">
    </div>
</div>

</div>
</section>

<!-- Colours -->
<section class="wrapper style1 special colours-section">
<div class="inner">
<header class="major">
    <h2>Colours</h2>
</header>

<div class="colour-grid">

    <div class="colour-card">
        <div class="colour-swatch" style="background:#4696e5;"></div>
        <div class="colour-info">
            Brand Blue<br>
            <span class="colour-hex" onclick="copyHex('#4696e5')">#4696e5</span>
        </div>
    </div>

    <div class="colour-card">
        <div class="colour-swatch" style="background:#0B4881;"></div>
        <div class="colour-info">
            Blue Dark<br>
            <span class="colour-hex" onclick="copyHex('#0B4881')">#0B4881</span>
        </div>
    </div>

    <div class="colour-card">
        <div class="colour-swatch" style="background:#828282;"></div>
        <div class="colour-info">
            Text Grey<br>
            <span class="colour-hex" onclick="copyHex('#828282')">#828282</span>
        </div>
    </div>

    <div class="colour-card">
        <div class="colour-swatch" style="background:#2d2d2d;"></div>
        <div class="colour-info">
            Text Black<br>
            <span class="colour-hex" onclick="copyHex('#2d2d2d')">#2d2d2d</span>
        </div>
    </div>

</div>

</div>
</section>

<!-- Downloads -->
<section class="wrapper style2 special">
<div class="inner">
<header class="major">
    <h2>Downloads</h2>
</header>

<div class="download-grid">

<div class="download-card">
<i class="fa-solid fa-image"></i>
<h4>White Logo</h4>
<a href="icons/whitelogo.png" download class="button small">Download</a>
</div>

<div class="download-card">
<i class="fa-solid fa-image"></i>
<h4>Blue Logo</h4>
<a href="/favicon.png" download class="button small">Download</a>
</div>

<div class="download-card">
<i class="fa-solid fa-image"></i>
<h4>Black Logo</h4>
<a href="icons/black logo.png" download class="button small">Download</a>
</div>

</div>

</div>
</section>

<!-- ORIGINAL FOOTER -->
<section id="footer">
    <ul class="actions special">
        <li><a href="https://pipchell.com" class="button icon solid fa-chevron-left">Back to pipchell.com</a></li>
    </ul>
    <p class="copyright">&copy; 2026 Pip Chell</p>
</section>

<div class="toast" id="toast">Copied</div>

<script>
function copyHex(hex) {
    navigator.clipboard.writeText(hex);
    const t = document.getElementById('toast');
    t.textContent = "Copied " + hex;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1500);
}
</script>

<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/jquery.scrolly.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>

</body>
</html>
