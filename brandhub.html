<!DOCTYPE HTML>
<html lang="en-GB">
<head>
<title>Brand Hub – Pip Chell</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
<meta name="robots" content="noindex">

<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="stylesheet" href="assets/css/main.css" />
<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
    --blue:       #4696e5;
    --blue-dark:  #0B4881;

    --text-grey:  #828282;
    --text-black: #2d2d2d;

    --grey-light: #fbfbfb;
    --grey-border:#ebebeb;
}

/* FIX TEXT COLOUR */
body, h1, h2, h3, h4, p, li {
    color: var(--text-black);
}

/* Logos */
.logo-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1.5em;
    max-width:860px;
    margin:auto;
}
@media(max-width:736px){
    .logo-grid{grid-template-columns:1fr;}
}
.logo-card {
    border-radius:8px;
    padding:2em;
    display:flex;
    justify-content:center;
    align-items:center;
}
.logo-card.light { background:var(--grey-light); border:1px solid var(--grey-border); }
.logo-card.dark { background:var(--text-black); }
.logo-card.blue { background:var(--blue); }

/* Colours */
.colours-section {
    background:#ffffff;
}
.colour-grid {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:1.25em;
    max-width:860px;
    margin:auto;
}
@media(max-width:736px){
    .colour-grid{grid-template-columns:1fr 1fr;}
}
.colour-card {
    border-radius:8px;
    overflow:hidden;
    border:1px solid var(--grey-border);
}
.colour-swatch { height:80px; }

/* FIX: colour names black */
.colour-info {
    background:#ffffff;
    padding:0.8em;
    font-size:0.8em;
    color: var(--text-black);
}

/* keep hex grey */
.colour-hex {
    cursor:pointer;
    font-family:monospace;
    color:var(--text-grey);
}
.colour-hex:hover {
    color:var(--blue);
}

/* Downloads */
.download-grid {
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:1.25em;
    max-width:860px;
    margin:auto;
}
@media(max-width:736px){
    .download-grid{grid-template-columns:1fr;}
}
.download-card {
    background:var(--grey-light);
    border:1px solid var(--grey-border);
    border-radius:8px;
    padding:1.5em;
}
.download-card * {
    color: var(--text-black) !important;
}
.download-card i {
    color: var(--blue) !important;
}

/* Toast */
.toast {
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#000;
    color:#fff;
    padding:6px 12px;
    border-radius:20px;
    font-size:0.8em;
    opacity:0;
    transition:0.2s;
}
.toast.show { opacity:1; }
</style>
</head>

<body class="is-preload">

</div>

<div class="toast" id="toast">Copied</div>

<script>
function copyHex(hex) {
    navigator.clipboard.writeText(hex);
    const t = document.getElementById('toast');
    t.textContent = "Copied " + hex;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),1500);
}
</script>
