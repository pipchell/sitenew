<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pip Chell - Bin Collections</title>
<link rel="icon" type="image/ico" href="favicon.ico">
<style>
* { box-sizing: border-box; }
body {
    margin: 0;
    padding: 0;
    background: #fbfbfb;
    color: #999999;
    font-family: Arial, Helvetica, sans-serif;
    min-height: 100vh;
}
.wrapper {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}
h1 {
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    margin-bottom: 40px;
    color: #4696e5;
    font-size: 50px;
}
/* Grid container */
.location-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    width: 100%;
}
/* Link buttons */
.location-link {
    text-decoration: none;
}
.link-box {
    background: transparent;
    padding: 35px;
    border-radius: 12px;
    border: solid 4px #e6e6e6;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
}
.link-box span {
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    color: #828282;
    font-size: 28px;
}
/* Request box */
.request-box {
    background: #ffffff;
    padding: 25px;
    margin-top: 40px;
    border-radius: 12px;
    border: solid 4px #e6e6e6;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
}
.request-box a {
    color: #4696e5;
    font-weight: 700;
    font-size: 28px;
    text-decoration: underline;
}
/* Footer */
footer {
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    font-size: 22px;
    margin-top: 40px;
}
.bottom-note {
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: 700;
    margin-top: 10px;
    font-size: 18px;
}
@media screen and (max-width: 768px) {
    h1 { font-size: 44px; }
    .link-box { padding: 28px; font-size: 20px; }
    .request-box a { font-size: 24px; }
}
</style>
</head>
<body>
<div class="wrapper">
    <h1>Bin Collections</h1>
    <div class="location-grid">
        <a href="https://pipchell.com/stuff/maidstone-bins" class="location-link">
            <div class="link-box"><span>Maidstone</span></div>
        </a>
        <a href="https://pipchell.com/stuff/royston-bins" class="location-link">
            <div class="link-box"><span>Royston</span></div>
        </a>
        <a href="https://pipchell.com/stuff/kenilworth-bins" class="location-link">
            <div class="link-box"><span>Kenilworth</span></div>
        </a>
    </div>
    <div class="request-box">
        <p>Request a new location:</p>
        <a href="mailto:bins@pipchell.com">
            bins@pipchell.com
        </a>
    </div>
        <div class="request-box">
<p>A project by Pip Chell</p>
            <a href="https://pipchell.com">Main Site</a>
    </div>
        <p style="margin:25px; text-align:center;"><a href="https://www.dmca.com/Protection/Status.aspx?id=36962642-068d-489a-a95a-5c2a13ead19e&refurl=https://pipchell.com/&rlo=true"
   title="DMCA.com Protection Status"
   class="dmca-badge"
   style="text-decoration:none; border-bottom:none;">
    <img src="https://images.dmca.com/Badges/dmca-badge-w200-5x1-06.png?ID=36962642-068d-489a-a95a-5c2a13ead19e"
         alt="DMCA.com Protection Status" />
</div>
</body>
</html>
