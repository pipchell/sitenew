<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pip Chell Support</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f4f8fb;
      color: #1b1b1b;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 400px;
      width: 90%;
    }

    .logo {
      width: 60px;
      height: 60px;
      margin-bottom: 15px;
    }

    h1 {
      margin: 10px 0 25px;
      font-size: 22px;
      font-weight: 600;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px;
      margin: 10px 0;
      border-radius: 6px;
      text-decoration: none;
      font-size: 15px;
      font-weight: 500;
      background-color: #0078D7;
      color: #ffffff;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background-color: #005fa3;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: #555;
    }

    .footer a {
      color: #0078D7;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="favicon.png" alt="Logo" class="logo">
    <h1>Pip Chell Support</h1>

    <a class="btn" href="https://support.pipchell.com/help/4238109764">
      Web Support Tier One
    </a>

    <a class="btn" href="https://support.pipchell.com/help/1704279550">
      Web Support Tier Two
    </a>

    <a class="btn" href="https://support.pipchell.com/help/311561576">
      Web Support Tier Three
    </a>

    <div class="footer">
      If email support is needed, email 
      <a href="mailto:need@support.pipchell.com">need@support.pipchell.com</a>
    </div>
  </div>

</body>
</html>
